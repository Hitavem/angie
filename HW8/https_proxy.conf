limit_req_zone $binary_remote_addr zone=https_proxy_rlim:10m rate=5r/s;

geoip2 /etc/angie/GeoLite2-Country.mmdb {
    auto_reload 5m;
    $geoip2_metadata_country_build metadata build_epoch;
    $geoip2_data_country_code default=RU source=$remote_addr country iso_code;
    $geoip2_data_country_name country names en; 
}

map $geoip2_data_country_code $allowed_country {	
     default no;
     RU yes;
     BY yes;
}


upstream http_backend {
    zone http-backend 10m;
    server 127.0.0.1:9080;
    server 127.0.0.1:9081;
    server 127.0.0.1:9082;
}

server {
    listen 10.31.78.18:80;
    server_name _;

    return 301 https://$host$request_uri;
}

server {
    listen 10.31.78.18:443 ssl;
    listen 10.31.78.18:443 quic reuseport;
    http2 on;
    http3 on;
    status_zone https_proxy; 
    server_name _;

    ssl_certificate /etc/angie/ssl/cert.crt;
    ssl_certificate_key  /etc/angie/ssl/cert_key.key;

    ssl_protocols TLSv1.2 TLSv1.3;

    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    #ssl_stapling on;
    #ssl_stapling_verify on;

    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    add_header Strict-Transport-Security max-age=31536000;

    if ($allowed_country = no) {
        return 403;
}

    location / {
        proxy_pass http://http_backend;

        limit_req zone=https_proxy_rlim burst=5 nodelay;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

}

    location /admin {
        proxy_pass http://http_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        auth_basic "Admin Area";
        auth_basic_user_file /etc/angie/.htpasswd;

        allow 10.103.252.0/24;
        allow 127.0.0.1;
        deny all;



}  

}
